name: CI

on:
  push:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff format
        run: uv run ruff format . 

      - name: Ruff linter
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest core/tests/unit

      - name: Integration tests
        run: uv run pytest core/tests/integration

      - name: BDD tests
        run: uv run pytest core/tests/behaviour